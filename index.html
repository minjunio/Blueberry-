<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        /* Standard, clean, non-dramatic UI */
        body, html {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; color: #333;
        }

        /* Public View */
        #public-view {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; text-align: center; background-color: #ffffff;
        }
        #public-view h1 { color: #2c3e50; font-weight: normal; }

        /* Hidden Admin Button */
        #admin-login-btn {
            position: fixed; top: 15px; right: 15px; width: 30px; height: 30px;
            background: transparent; border: none; cursor: pointer; z-index: 100;
        }

        /* Admin Dashboard View */
        #admin-view {
            display: none; padding: 40px; max-width: 1200px; margin: 0 auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 30px; }
        .header h2 { margin: 0; color: #2c3e50; }
        .btn-close { padding: 8px 16px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }

        /* User Data Cards (Boxes) */
        .visitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .visitor-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; border-top: 4px solid #3498db; }
        .visitor-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .visitor-id { font-weight: bold; color: #7f8c8d; font-size: 0.9em; }
        .timestamp { color: #95a5a6; font-size: 0.8em; }
        
        /* Data Rows */
        .data-group { margin-bottom: 15px; }
        .data-group h4 { margin: 0 0 5px 0; font-size: 0.85em; color: #bdc3c7; text-transform: uppercase; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 4px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 2px; }
        .data-label { color: #555; font-weight: 500; }
        .data-value { color: #2c3e50; text-align: right; max-width: 60%; word-wrap: break-word; }
        .cookie-box { background-color: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.8em; color: #d35400; word-break: break-all; }
    </style>
</head>
<body>

    <div id="public-view">
        <h1>Welcome to the Site</h1>
        <p>Browsing normally...</p>
    </div>

    <button id="admin-login-btn" title="Admin Login"></button>

    <div id="admin-view">
        <div class="header">
            <h2>Visitor Analytics Dashboard</h2>
            <button class="btn-close" id="btn-close">Close Dashboard</button>
        </div>
        
        <div class="visitor-grid" id="visitor-grid">
            </div>
    </div>

    <script>
        // Generate a random session ID for this visitor
        const sessionId = 'USR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        const visitTime = new Date().toLocaleString();

        const visitorData = {
            ipData: { ip: "Fetching...", network: "Fetching..." },
            device: { os: navigator.platform, browser: navigator.userAgent.split(' ')[0], cores: navigator.hardwareConcurrency || 'N/A' },
            display: { resolution: `${window.screen.width}x${window.screen.height}`, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone },
            cookies: document.cookie || "No local cookies found for this domain."
        };

        // Fetch IP and Network data using a free API (ipapi.co)
        async function fetchIPData() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                visitorData.ipData.ip = data.ip; // Will return IPv6 if applicable, otherwise IPv4
                visitorData.ipData.network = data.org || "Unknown ISP";
                visitorData.location = `${data.city}, ${data.country_name}`;
                renderDashboard(); // Update UI once IP is loaded
            } catch (error) {
                visitorData.ipData.ip = "Ad-blocker prevented IP fetch";
                renderDashboard();
            }
        }

        // Render the data into a clean "User Box"
        function renderDashboard() {
            const grid = document.getElementById('visitor-grid');
            
            const cardHTML = `
                <div class="visitor-card">
                    <div class="visitor-header">
                        <span class="visitor-id">${sessionId}</span>
                        <span class="timestamp">${visitTime}</span>
                    </div>
                    
                    <div class="data-group">
                        <h4>Network & Location</h4>
                        <div class="data-row"><span class="data-label">IP Address</span><span class="data-value">${visitorData.ipData.ip}</span></div>
                        <div class="data-row"><span class="data-label">ISP/Network</span><span class="data-value">${visitorData.ipData.network}</span></div>
                        <div class="data-row"><span class="data-label">Est. Location</span><span class="data-value">${visitorData.location || "Pending..."}</span></div>
                    </div>

                    <div class="data-group">
                        <h4>Device Data</h4>
                        <div class="data-row"><span class="data-label">OS/Platform</span><span class="data-value">${visitorData.device.os}</span></div>
                        <div class="data-row"><span class="data-label">Screen Res</span><span class="data-value">${visitorData.display.resolution}</span></div>
                        <div class="data-row"><span class="data-label">Timezone</span><span class="data-value">${visitorData.display.timezone}</span></div>
                        <div class="data-row"><span class="data-label">CPU Cores</span><span class="data-value">${visitorData.device.cores}</span></div>
                    </div>

                    <div class="data-group">
                        <h4>Local Site Cookies</h4>
                        <div class="cookie-box">${visitorData.cookies}</div>
                    </div>
                </div>
            `;
            
            grid.innerHTML = cardHTML;
        }

        // Setup a test cookie just to prove the script can read them
        document.cookie = "test_cookie=Hello_World; max-age=3600; path=/";

        // Start data collection
        fetchIPData();
        renderDashboard(); // Initial render with pending data

        // --- Basic UI Logic ---
        document.getElementById('admin-login-btn').addEventListener('click', () => {
            const pwd = prompt("Enter Password:");
            if (pwd === "monterysasd") {
                document.getElementById('public-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
            }
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('public-view').style.display = 'flex';
        });
    </script>
</body>
</html>
