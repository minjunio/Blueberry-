<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Analytics | Modern Web</title>
    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --primary-accent: #0070f3;
            --term-bg: #0a0a0a;
            --term-text: #00ff41;
            --term-accent: #008f11;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden;
        }

        /* --- Public Interface --- */
        #public-ui {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; text-align: center; padding: 20px;
            background: radial-gradient(circle at center, #ffffff 0%, #f0f0f0 100%);
        }
        .hero-title { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; }
        .hero-subtitle { font-size: 1.25rem; color: #666; max-width: 600px; line-height: 1.6; }
        .loading-spinner {
            margin-top: 30px; width: 40px; height: 40px;
            border: 4px solid rgba(0, 112, 243, 0.1); border-left-color: var(--primary-accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Hidden Lock Button --- */
        #admin-trigger {
            position: fixed; top: 20px; right: 20px;
            background: transparent; border: none; font-size: 20px;
            cursor: pointer; opacity: 0; transition: opacity 0.3s;
            z-index: 50; padding: 10px;
        }
        /* Reveal button slightly when hovering in the top right corner */
        html:hover #admin-trigger:hover { opacity: 0.8; }

        /* --- Admin Terminal Interface --- */
        #admin-ui {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background-color: var(--term-bg);
            color: var(--term-text); font-family: 'Fira Code', 'Courier New', Courier, monospace;
            z-index: 1000; padding: 2rem; overflow-y: auto;
        }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--term-accent); padding-bottom: 1rem; margin-bottom: 2rem;
        }
        .admin-header h2 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px var(--term-text); }
        .close-btn {
            background: none; border: 1px solid var(--term-accent); color: var(--term-text);
            padding: 5px 15px; cursor: pointer; font-family: inherit; font-weight: bold; transition: all 0.2s;
        }
        .close-btn:hover { background: var(--term-accent); color: var(--term-bg); }

        /* Data Grid */
        .data-category { margin-bottom: 2rem; }
        .data-category h3 { color: #fff; margin-bottom: 1rem; border-left: 3px solid var(--term-accent); padding-left: 10px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .data-card { background: rgba(0, 143, 17, 0.1); border: 1px solid rgba(0, 255, 65, 0.2); padding: 15px; border-radius: 4px; }
        .data-key { font-size: 0.85rem; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .data-value { font-size: 1rem; word-break: break-all; }
        .status-log { margin-top: 20px; padding: 15px; background: #111; border-left: 3px solid #f39c12; font-size: 0.9rem; color: #ccc; }
    </style>
</head>
<body>

    <div id="public-ui">
        <h1 class="hero-title">Nexus Analytics</h1>
        <p class="hero-subtitle">Optimizing digital experiences through seamless environment detection.</p>
        <div class="loading-spinner"></div>
    </div>

    <button id="admin-trigger" title="System Access">⚙️</button>

    <div id="admin-ui">
        <div class="admin-header">
            <h2>> Reconnaissance_Payload_v2.0</h2>
            <button class="close-btn" id="close-btn">EXIT</button>
        </div>
        <div id="dashboard">
            </div>
        <div class="status-log" id="status-log">System initialized. Awaiting target data...</div>
    </div>

    <script>
        /**
         * Penetration Testing Educational Script
         * Demonstrates passive and active browser fingerprinting techniques.
         */
        const Scraper = {
            data: {
                Hardware: {},
                Software: {},
                Network: {},
                Advanced: {},
                Location: {}
            },

            log(msg) {
                const logEl = document.getElementById('status-log');
                const time = new Date().toLocaleTimeString();
                logEl.innerHTML += `<br>[${time}] ${msg}`;
            },

            // 1. Basic Hardware & Software Specs
            gatherPassiveSpecs() {
                this.data.Software['User Agent'] = navigator.userAgent;
                this.data.Software['Platform'] = navigator.platform;
                this.data.Software['Language'] = navigator.language;
                this.data.Software['Cookies Enabled'] = navigator.cookieEnabled ? "Yes" : "No";
                
                this.data.Hardware['Screen Res'] = `${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}-bit)`;
                this.data.Hardware['CPU Cores'] = navigator.hardwareConcurrency || 'Unknown';
                this.data.Hardware['Device Memory'] = navigator.deviceMemory ? `>= ${navigator.deviceMemory}GB` : 'Unknown';
                this.data.Hardware['Touch Support'] = navigator.maxTouchPoints > 0 ? `Yes (${navigator.maxTouchPoints} points)` : "No";
                
                this.log("Passive specs gathered.");
            },

            // 2. Network Information
            gatherNetwork() {
                if (navigator.connection) {
                    this.data.Network['Effective Type'] = navigator.connection.effectiveType || 'Unknown';
                    this.data.Network['Downlink'] = navigator.connection.downlink ? `${navigator.connection.downlink} Mbps` : 'Unknown';
                    this.data.Network['RTT'] = navigator.connection.rtt ? `${navigator.connection.rtt} ms` : 'Unknown';
                    this.data.Network['Save Data Mode'] = navigator.connection.saveData ? "Enabled" : "Disabled";
                } else {
                    this.data.Network['Status'] = "Network Information API not supported.";
                }
                this.log("Network info checked.");
            },

            // 3. Advanced Fingerprinting (Canvas & WebGL)
            gatherAdvanced() {
                this.data.Advanced['Timezone'] = Intl.DateTimeFormat().resolvedOptions().timeZone;
                
                // Canvas Fingerprint
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = "top";
                    ctx.font = "14px 'Arial'";
                    ctx.textBaseline = "alphabetic";
                    ctx.fillStyle = "#f60";
                    ctx.fillRect(125,1,62,20);
                    ctx.fillStyle = "#069";
                    ctx.fillText("http://nexus-analytics.render.com", 2, 15);
                    ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                    ctx.fillText("http://nexus-analytics.render.com", 4, 17);
                    
                    // Simple hash of the base64 output
                    let hash = 0;
                    const str = canvas.toDataURL();
                    for (let i = 0; i < str.length; i++) {
                        const char = str.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    this.data.Advanced['Canvas Hash'] = Math.abs(hash).toString(16);
                } catch(e) {
                    this.data.Advanced['Canvas Hash'] = "Blocked/Failed";
                }

                // WebGL Renderer
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    const ext = gl.getExtension('WEBGL_debug_renderer_info');
                    this.data.Advanced['GPU Vendor'] = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) || "Unknown";
                    this.data.Advanced['GPU Renderer'] = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || "Unknown";
                } catch(e) {
                    this.data.Advanced['GPU Renderer'] = "WebGL Blocked";
                }
                
                this.log("Advanced fingerprinting completed.");
            },

            // 4. Battery API (If available)
            async gatherBattery() {
                if ('getBattery' in navigator) {
                    try {
                        const battery = await navigator.getBattery();
                        this.data.Hardware['Battery Level'] = `${Math.round(battery.level * 100)}%`;
                        this.data.Hardware['Charging'] = battery.charging ? "Yes" : "No";
                        this.log("Battery status retrieved.");
                    } catch(e) {
                        this.data.Hardware['Battery Level'] = "Restricted";
                    }
                } else {
                    this.data.Hardware['Battery Level'] = "API Deprecated/Unsupported";
                }
            },

            // 5. Geolocation (Active Prompt)
            gatherLocation() {
                return new Promise((resolve) => {
                    if ("geolocation" in navigator) {
                        this.data.Location['Status'] = "Prompting target for permissions...";
                        this.log("Requesting geolocation...");
                        
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                this.data.Location['Coordinates'] = `${position.coords.latitude}, ${position.coords.longitude}`;
                                this.data.Location['Accuracy'] = `Within ${position.coords.accuracy} meters`;
                                this.data.Location['Status'] = "Acquired";
                                this.log("Geolocation acquired successfully.");
                                resolve();
                            },
                            (error) => {
                                this.data.Location['Status'] = `Denied/Failed (${error.message})`;
                                this.log(`Geolocation error: ${error.message}`);
                                resolve();
                            },
                            { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                        );
                    } else {
                        this.data.Location['Status'] = "Not supported by browser.";
                        resolve();
                    }
                });
            },

            // Render data to the Admin UI
            renderUI() {
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = '';

                for (const [categoryName, categoryData] of Object.entries(this.data)) {
                    let html = `<div class="data-category"><h3>[ ${categoryName} ]</h3><div class="data-grid">`;
                    
                    for (const [key, value] of Object.entries(categoryData)) {
                        html += `
                            <div class="data-card">
                                <span class="data-key">${key}</span>
                                <span class="data-value">${value}</span>
                            </div>
                        `;
                    }
                    html += `</div></div>`;
                    dashboard.innerHTML += html;
                }
            },

            // Main Execution
            async execute() {
                this.gatherPassiveSpecs();
                this.gatherNetwork();
                this.gatherAdvanced();
                this.renderUI(); // Render immediate data
                
                await this.gatherBattery();
                this.renderUI(); // Re-render with battery

                // Attempt location last, as it prompts the user
                await this.gatherLocation();
                this.renderUI(); // Final render
            }
        };

        // --- Security / Authentication Logic ---
        document.getElementById('admin-trigger').addEventListener('click', () => {
            const pwd = prompt("AUTH_REQUIRED: Enter administrator credentials.");
            if (pwd === "monterysasd") {
                document.getElementById('admin-ui').style.display = 'block';
                document.body.style.overflow = 'hidden'; // Stop background scrolling
            } else if (pwd !== null) {
                alert("ERR_01: Authentication failed.");
            }
        });

        document.getElementById('close-btn').addEventListener('click', () => {
            document.getElementById('admin-ui').style.display = 'none';
            document.body.style.overflow = 'auto';
        });

        // Initialize Scraper on Load
        window.addEventListener('load', () => {
            Scraper.execute();
        });
    </script>
</body>
</html>
