<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CMS Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .content-block { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800">

    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">System Login</h1>
            <p class="text-slate-500 mb-6 text-sm">Enter passcode to start building.</p>
            <input type="password" id="passcode" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4" placeholder="Passcode">
            <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Enter Generator
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden">Incorrect passcode.</p>
        </div>
    </div>

    <div id="dashboard" class="hidden pb-20">
        <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
            <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-layer-group text-blue-600 text-xl"></i>
                    <span class="font-bold text-xl tracking-tight">Static Page Generator</span>
                </div>
                <button onclick="exportPage()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg font-medium shadow-sm transition flex items-center">
                    <i class="fas fa-download mr-2"></i> Export HTML File
                </button>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto px-4 py-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                
                <h2 class="text-xl font-bold mb-4 border-b pb-2">1. Page Setup & SEO</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">URL Path / File Name</label>
                        <input type="text" id="page-slug" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="e.g., Chinesecar">
                        <p class="text-xs text-slate-500 mt-1">This becomes your URL: bluecrypto.ink/[name]</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Main Page Title (H1)</label>
                        <input type="text" id="page-title" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="My Awesome Post">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">SEO Meta Title</label>
                        <input type="text" id="seo-title" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">SEO Keywords</label>
                        <input type="text" id="seo-keywords" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="crypto, cars, news">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">SEO Meta Description</label>
                        <textarea id="seo-desc" rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                </div>

                <h2 class="text-xl font-bold mb-4 border-b pb-2">2. Build Content</h2>
                <div id="content-blocks" class="space-y-4 mb-6">
                    </div>

                <div class="flex gap-3 mt-6 p-4 bg-slate-50 border border-slate-200 rounded-lg justify-center">
                    <span class="text-sm text-slate-500 self-center mr-2">Add new section:</span>
                    <button onclick="addTextBlock()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 font-medium shadow-sm">
                        <i class="fas fa-align-left mr-1"></i> Text Body
                    </button>
                    <button onclick="addImageBlock()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 font-medium shadow-sm">
                        <i class="fas fa-image mr-1"></i> Image
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Login Logic
        function attemptLogin() {
            if(document.getElementById('passcode').value === 'monterysasd') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                addTextBlock(); // Start with one text block
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // Block Builder Logic
        const container = document.getElementById('content-blocks');

        function addTextBlock() {
            const div = document.createElement('div');
            div.className = "content-block bg-slate-50 p-4 border border-slate-200 rounded-lg relative group";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-times"></i></button>
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fas fa-align-left text-blue-500 mr-2"></i>Text Block</label>
                <textarea class="block-data w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 h-32" placeholder="Write your paragraph here..." data-type="text"></textarea>
            `;
            container.appendChild(div);
        }

        function addImageBlock() {
            const div = document.createElement('div');
            div.className = "content-block bg-slate-50 p-4 border border-slate-200 rounded-lg relative group";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-times"></i></button>
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fas fa-image text-green-500 mr-2"></i>Image Block</label>
                <input type="text" class="block-data w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 mb-2" placeholder="Paste Image URL (https://...)" data-type="image-url">
                <input type="text" class="block-data w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Image Caption (Optional)" data-type="image-caption">
            `;
            container.appendChild(div);
        }

        // Export & Generate HTML Logic
        function exportPage() {
            const slug = document.getElementById('page-slug').value || 'untitled';
            const title = document.getElementById('page-title').value || 'Untitled Page';
            const seoTitle = document.getElementById('seo-title').value || title;
            const seoDesc = document.getElementById('seo-desc').value;
            const seoKeys = document.getElementById('seo-keywords').value;

            // Generate the dynamic HTML body from our blocks
            let generatedBodyHTML = '';
            const blocks = document.querySelectorAll('.content-block');
            
            blocks.forEach(block => {
                const inputs = block.querySelectorAll('.block-data');
                if(inputs.length === 1 && inputs[0].dataset.type === 'text') {
                    // It's a text block
                    const text = inputs[0].value.replace(/\n/g, '<br>');
                    if(text) generatedBodyHTML += `<p class="text-lg text-slate-700 leading-relaxed mb-6">${text}</p>\n`;
                } else if(inputs.length === 2 && inputs[0].dataset.type === 'image-url') {
                    // It's an image block
                    const url = inputs[0].value;
                    const caption = inputs[1].value;
                    if(url) {
                        generatedBodyHTML += `
                            <figure class="my-8">
                                <img src="${url}" alt="${caption}" class="w-full rounded-xl shadow-md">
                                ${caption ? `<figcaption class="text-center text-sm text-slate-500 mt-3">${caption}</figcaption>` : ''}
                            </figure>\n`;
                    }
                }
            });

            // The template for the final exported page
            const finalHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${seoTitle}</title>
    <meta name="description" content="${seoDesc}">
    <meta name="keywords" content="${seoKeys}">
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-white antialiased">
    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-16">
        <article>
            <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-900 tracking-tight mb-12 text-center">${title}</h1>
            <div class="prose prose-lg mx-auto">
                ${generatedBodyHTML}
            </div>
        </article>
        
        <div class="mt-16 pt-8 border-t border-slate-200 text-center">
            <a href="/" class="text-blue-600 hover:underline font-medium">&larr; Back to Home</a>
        </div>
    </main>
</body>
</html>`;

            // Trigger the download
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            // Note: If they want clean URLs on Render (bluecrypto.ink/Chinesecar)
            // They should name the file index.html and put it in a folder named Chinesecar.
            // For simplicity, we export as Chinesecar.html here.
            link.download = `${slug}.html`; 
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
